{% set name = "uc-micro-py" %}
{% set version = "1.0.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: d321b92cff673ec58027c04015fcaa8bb1e005478643ff4a500882eaab88c48a

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<37]

requirements:
  host:
    - pip
    - setuptools
    - python
  run:
    - python

test:
  source_files:
    - test
  imports:
    - uc_micro
    - uc_micro.categories
    - uc_micro.categories.Cc
    - uc_micro.categories.Cf
    - uc_micro.categories.P
    - uc_micro.categories.Z
    - uc_micro.properties
    - uc_micro.properties.Any
  requires:
    - pip
    - pytest
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -v test

about:
  home: https://github.com/tsutsu3/uc.micro-py
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Micro subset of unicode data files for linkify-it-py projects.
  description: Micro subset of unicode data files for linkify-it-py projects.
  dev_url: https://github.com/tsutsu3/uc.micro-py
  doc_url: https://github.com/tsutsu3/uc.micro-py

extra:
  recipe-maintainers:
    - chrisjsewell
