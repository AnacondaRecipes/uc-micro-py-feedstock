{% set name = "uc-micro-py" %}
{% set version = "2.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/u/uc-micro-py/uc_micro_py-2.0.0.tar.gz
  sha256: c53691e495c8db60e16ffc4861a35469b0ba0821fe409a8a7a0a71864d33a811

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<37]

requirements:
  host:
    - pip
    - setuptools
    - python
  run:
    - python

test:
  source_files:
    - test
  imports:
    - uc_micro
    - uc_micro.categories
    - uc_micro.categories.Cc
    - uc_micro.categories.Cf
    - uc_micro.categories.P
    - uc_micro.categories.Z
    - uc_micro.properties
    - uc_micro.properties.Any
  requires:
    - pip
    - pytest
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -v test

about:
  home: https://github.com/tsutsu3/uc.micro-py
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Micro subset of unicode data files for linkify-it-py projects.
  description: Micro subset of unicode data files for linkify-it-py projects.
  dev_url: https://github.com/tsutsu3/uc.micro-py
  doc_url: https://github.com/tsutsu3/uc.micro-py/blob/main/README.md

extra:
  recipe-maintainers:
    - chrisjsewell
